services:
  migration:
    image: ghcr.io/richardd-f/lunchcart:latest
    container_name: lunchcart-migration
    env_file:
      - .env
    command: prisma migrate deploy
    networks:
      - npm_default

  seed:
    image: ghcr.io/richardd-f/lunchcart:latest
    container_name: lunchcart-seed
    env_file:
      - .env
    command: prisma db seed
    networks:
      - npm_default

  web:
    image: ghcr.io/richardd-f/lunchcart:latest
    container_name: lunchcart
    expose:
      - 3000
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.90'
    depends_on:
      - migration
    networks:
      - npm_default

networks:
  npm_default:
    external: true
